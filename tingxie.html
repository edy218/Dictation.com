<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听写练习</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1008;
    --paper: #f5efe3;
    --red: #c0392b;
    --red-light: #e8503e;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --muted: #8b7355;
    --border: #c9b89a;
    --success: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Ink wash background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%, rgba(180,150,100,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(160,130,90,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 80% 80% at 50% 50%, rgba(245,239,227,1) 0%, #ede4d0 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Vertical lines like practice paper */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 79px,
      rgba(180,150,100,0.08) 79px,
      rgba(180,150,100,0.08) 80px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.15em;
    line-height: 1;
    position: relative;
    display: inline-block;
  }

  .title-zh::after {
    content: '';
    display: block;
    width: 60%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    margin: 12px auto 0;
  }

  .title-en {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Cards */
  .card {
    background: rgba(255,252,245,0.85);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(100,70,30,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
  }

  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title::before, .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Input area */
  #word-input {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem;
    line-height: 2;
    color: var(--ink);
    background: rgba(255,252,245,0.6);
    resize: vertical;
    outline: none;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
  }

  #word-input:focus {
    border-color: var(--gold);
    background: rgba(255,252,245,0.95);
  }

  #word-input::placeholder { color: rgba(139,115,85,0.5); font-size: 0.95rem; }

  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 8px;
    text-align: right;
  }

  /* Word count badge */
  .word-count {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--paper);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 2px;
    margin-top: 10px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 3px;
    padding: 12px 28px;
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }

  .btn-primary {
    background: var(--red);
    color: white;
    box-shadow: 0 3px 0 #8b1a12, 0 4px 12px rgba(192,57,43,0.3);
  }

  .btn-primary:hover {
    background: var(--red-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 0 #8b1a12, 0 6px 16px rgba(192,57,43,0.35);
  }

  .btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 0 #8b1a12; }

  .btn-gold {
    background: var(--gold);
    color: var(--ink);
    box-shadow: 0 3px 0 #8b6914, 0 4px 12px rgba(201,168,76,0.3);
  }

  .btn-gold:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: rgba(180,150,100,0.1); color: var(--ink); }

  .btn-success {
    background: var(--success);
    color: white;
    box-shadow: 0 3px 0 #1a3d2c;
  }

  .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Actions row */
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
    align-items: center;
  }

  /* Test mode */
  #test-section { display: none; }

  .test-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Audio player visual */
  .audio-player {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .audio-icon {
    width: 48px;
    height: 48px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
  }

  .audio-icon:hover { background: var(--red-light); transform: scale(1.05); }

  .audio-icon svg { width: 22px; height: 22px; fill: white; }

  .audio-info { flex: 1; }

  .audio-word-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .audio-number {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
  }

  /* Waveform animation */
  .wave-bars {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
  }

  .wave-bar {
    width: 4px;
    background: var(--gold);
    border-radius: 2px;
    animation: none;
    height: 6px;
    transition: height 0.1s;
  }

  .wave-bar.playing {
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }

  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 22px; }
  }

  /* Writing area */
  .writing-area {
    margin-bottom: 20px;
  }

  .writing-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #writing-input {
    width: 100%;
    min-height: 80px;
    border: 2px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    font-family: 'Noto Serif SC', serif;
    font-size: 1.8rem;
    line-height: 1.6;
    color: var(--ink);
    background: white;
    outline: none;
    letter-spacing: 0.15em;
    text-align: center;
    transition: border-color 0.2s;
    resize: none;
  }

  #writing-input:focus { border-color: var(--gold); }

  /* Results display */
  #result-section { display: none; }

  .results-grid {
    display: grid;
    gap: 12px;
  }

  .result-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,252,245,0.7);
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: all 0.3s;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  .result-original {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  .result-play {
    width: 32px;
    height: 32px;
    background: var(--ink);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .result-play:hover { background: var(--red); transform: scale(1.1); }
  .result-play svg { width: 14px; height: 14px; fill: white; }

  .result-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Seal stamp decoration */
  .seal {
    display: inline-block;
    width: 60px;
    height: 60px;
    border: 3px solid var(--red);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.65rem;
    color: var(--red);
    letter-spacing: 0.05em;
    transform: rotate(-8deg);
    opacity: 0.7;
    line-height: 1.4;
    text-align: center;
    padding: 4px;
    position: absolute;
    top: 16px;
    right: 20px;
  }

  /* Status indicator */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.speaking { background: var(--red); animation: pulse 1s infinite; }
  .status-dot.idle { background: var(--muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Speed controls */
  .speed-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .speed-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 2px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    font-family: inherit;
  }

  .speed-btn.active, .speed-btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state .big-char {
    font-family: 'Noto Serif SC', serif;
    font-size: 5rem;
    opacity: 0.15;
    display: block;
    margin-bottom: 12px;
    line-height: 1;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Delay setting */
  .delay-control {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .delay-control input[type=range] {
    width: 90px;
    accent-color: var(--red);
  }

  .delay-val { font-weight: 600; color: var(--ink); min-width: 28px; }

  /* Section labels */
  .section-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* Mobile */
  @media(max-width: 480px) {
    .result-row { grid-template-columns: 30px 1fr 1fr auto; }
    .audio-player { flex-direction: column; text-align: center; }
    .wave-bars { justify-content: center; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-zh">听写练习</div>
    <div class="title-en">Chinese Dictation Practice</div>
  </header>

  <!-- INPUT SECTION -->
  <div id="input-section">
    <div class="card" style="position:relative;">
      <div class="seal">听写<br>练习</div>
      <div class="card-title">输入词语</div>

      <div class="section-tag">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Enter one word or phrase per line
      </div>

      <textarea id="word-input" placeholder="妈妈&#10;学校&#10;朋友&#10;明天&#10;..."></textarea>
      <div class="hint">每行输入一个词 · One word per line</div>

      <div id="word-count-badge" class="word-count" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
        <span id="count-text">0 words</span>
      </div>

      <div class="divider">设置 Settings</div>

      <div style="display:flex; flex-wrap:wrap; gap:20px; align-items:center;">
        <div class="delay-control">
          <span>Delay between words:</span>
          <input type="range" id="delay-slider" min="1" max="8" value="3" step="0.5">
          <span class="delay-val" id="delay-val">3s</span>
        </div>

        <div class="speed-controls">
          <span style="font-size:0.8rem;color:var(--muted);">Speed:</span>
          <button class="speed-btn" data-rate="0.7">慢</button>
          <button class="speed-btn active" data-rate="1.0">正常</button>
          <button class="speed-btn" data-rate="1.3">快</button>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="start-btn" onclick="startTest()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          开始听写 Start Test
        </button>
      </div>
    </div>
  </div>

  <!-- TEST SECTION -->
  <div id="test-section">
    <div class="card">
      <div class="test-header">
        <div>
          <div class="section-tag">
            <span class="status-dot idle" id="status-dot"></span>
            <span id="status-text">Ready</span>
          </div>
          <div style="font-family:'Noto Serif SC',serif; font-size:1.1rem;">
            Word <span id="current-num">1</span> of <span id="total-num">0</span>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="stopTest()" style="font-size:0.8rem; padding:8px 16px;">
          ✕ Stop
        </button>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="audio-player">
        <div class="audio-icon" id="play-btn" onclick="replayWord()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="audio-info">
          <div class="audio-word-label">Now reading · 正在播放</div>
          <div class="audio-number" id="audio-label">Word <span id="audio-word-num">1</span></div>
        </div>
        <div class="wave-bars">
          <div class="wave-bar" id="bar1"></div>
          <div class="wave-bar" id="bar2"></div>
          <div class="wave-bar" id="bar3"></div>
          <div class="wave-bar" id="bar4"></div>
          <div class="wave-bar" id="bar5"></div>
        </div>
      </div>

      <div class="writing-area">
        <div class="writing-label">写下你听到的词 · Write what you hear</div>
        <textarea id="writing-input" placeholder="在这里写..." rows="2"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-ghost" onclick="replayWord()" style="flex:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          Replay
        </button>
        <button class="btn btn-primary" id="next-btn" onclick="nextWord()">
          Next →
        </button>
        <button class="btn btn-success" id="complete-btn" onclick="completeTest()" style="display:none;">
          ✓ Complete 完成
        </button>
      </div>
    </div>
  </div>

  <!-- RESULT SECTION -->
  <div id="result-section">
    <div class="card">
      <div class="card-title">听写结果 Results</div>
      <div id="results-grid" class="results-grid"></div>
    </div>

    <div class="actions" style="justify-content:center; margin-top:8px;">
      <button class="btn btn-primary" onclick="restartTest()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        Test Again 再练一次
      </button>
      <button class="btn btn-ghost" onclick="backToInput()">
        Edit Words 修改词语
      </button>
    </div>
  </div>

</div>

<script>
  // State
  let words = [];
  let currentIndex = 0;
  let speechRate = 1.0;
  let delaySeconds = 3;
  let autoTimer = null;
  let isPlaying = false;
  let isSpeaking = false;

  // UI refs
  const wordInput = document.getElementById('word-input');
  const wordCountBadge = document.getElementById('word-count-badge');
  const countText = document.getElementById('count-text');
  const delaySlider = document.getElementById('delay-slider');
  const delayVal = document.getElementById('delay-val');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const progressFill = document.getElementById('progress-fill');
  const currentNum = document.getElementById('current-num');
  const totalNum = document.getElementById('total-num');
  const audioWordNum = document.getElementById('audio-word-num');
  const writingInput = document.getElementById('writing-input');
  const nextBtn = document.getElementById('next-btn');
  const completeBtn = document.getElementById('complete-btn');

  const waveBars = [
    document.getElementById('bar1'),
    document.getElementById('bar2'),
    document.getElementById('bar3'),
    document.getElementById('bar4'),
    document.getElementById('bar5'),
  ];

  // Word count live update
  wordInput.addEventListener('input', () => {
    const list = parseWords();
    if (list.length > 0) {
      wordCountBadge.style.display = 'inline-flex';
      countText.textContent = `${list.length} word${list.length !== 1 ? 's' : ''}`;
    } else {
      wordCountBadge.style.display = 'none';
    }
  });

  // Delay slider
  delaySlider.addEventListener('input', () => {
    delaySeconds = parseFloat(delaySlider.value);
    delayVal.textContent = delaySeconds + 's';
  });

  // Speed buttons
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      speechRate = parseFloat(btn.dataset.rate);
    });
  });

  function parseWords() {
    return wordInput.value
      .split('\n')
      .map(w => w.trim())
      .filter(w => w.length > 0);
  }

  function setWaveAnimation(playing) {
    waveBars.forEach(b => {
      if (playing) b.classList.add('playing');
      else { b.classList.remove('playing'); b.style.height = '6px'; }
    });
  }

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function speak(text, onEnd) {
    if (!('speechSynthesis' in window)) {
      alert('Your browser does not support Text-to-Speech. Please try Chrome or Edge.');
      return;
    }
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    utter.rate = speechRate;
    utter.pitch = 1.0;

    // Try to find a Chinese voice
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.startsWith('zh'));
    if (zhVoice) utter.voice = zhVoice;

    utter.onstart = () => {
      isSpeaking = true;
      setWaveAnimation(true);
      setStatus('speaking', 'Reading...');
    };

    utter.onend = () => {
      isSpeaking = false;
      setWaveAnimation(false);
      setStatus('idle', 'Done');
      if (onEnd) onEnd();
    };

    utter.onerror = () => {
      isSpeaking = false;
      setWaveAnimation(false);
      if (onEnd) onEnd();
    };

    window.speechSynthesis.speak(utter);
  }

  function showSection(id) {
    ['input-section', 'test-section', 'result-section'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
  }

  function startTest() {
    words = parseWords();
    if (words.length === 0) {
      wordInput.focus();
      wordInput.style.borderColor = 'var(--red)';
      setTimeout(() => wordInput.style.borderColor = '', 1000);
      return;
    }

    currentIndex = 0;
    totalNum.textContent = words.length;
    writingInput.value = '';
    showSection('test-section');
    loadWord(0);
  }

  function loadWord(idx) {
    currentIndex = idx;
    currentNum.textContent = idx + 1;
    audioWordNum.textContent = idx + 1;

    const progress = ((idx) / words.length) * 100;
    progressFill.style.width = progress + '%';

    // Show/hide next vs complete
    if (idx === words.length - 1) {
      nextBtn.style.display = 'none';
      completeBtn.style.display = 'inline-flex';
    } else {
      nextBtn.style.display = 'inline-flex';
      completeBtn.style.display = 'none';
    }

    writingInput.value = '';
    setStatus('idle', 'Get ready...');

    // Auto play after short pause
    setTimeout(() => {
      speak(words[idx]);
    }, 600);
  }

  function replayWord() {
    if (isSpeaking) window.speechSynthesis.cancel();
    speak(words[currentIndex]);
  }

  function nextWord() {
    if (currentIndex < words.length - 1) {
      loadWord(currentIndex + 1);
    }
  }

  function completeTest() {
    window.speechSynthesis.cancel();
    progressFill.style.width = '100%';
    showResults();
  }

  function stopTest() {
    window.speechSynthesis.cancel();
    clearTimeout(autoTimer);
    backToInput();
  }

  function showResults() {
    showSection('result-section');
    const grid = document.getElementById('results-grid');
    grid.innerHTML = '';

    words.forEach((word, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.style.animationDelay = (i * 0.06) + 's';
      row.innerHTML = `
        <div class="result-num">${i + 1}</div>
        <div>
          <div class="result-label">词语</div>
          <div class="result-original">${escapeHtml(word)}</div>
        </div>
        <div>
          <div class="result-label">拼音提示</div>
          <div style="font-size:0.85rem;color:var(--muted);margin-top:2px;">${getPinyin(word)}</div>
        </div>
        <button class="result-play" onclick="playResult(${i})" title="播放">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      `;
      grid.appendChild(row);
    });
  }

  function playResult(idx) {
    speak(words[idx]);
  }

  function restartTest() {
    showSection('test-section');
    currentIndex = 0;
    writingInput.value = '';
    totalNum.textContent = words.length;
    loadWord(0);
  }

  function backToInput() {
    window.speechSynthesis.cancel();
    showSection('input-section');
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Simple visual pinyin hint — just show character count
  function getPinyin(word) {
    const count = [...word].length;
    return `${count} character${count !== 1 ? 's' : ''}`;
  }

  // Load voices (needed for some browsers)
  if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };
    window.speechSynthesis.getVoices();
  }

  // Show input section by default
  showSection('input-section');
</script>
</body>
</html>
